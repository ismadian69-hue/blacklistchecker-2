<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blacklist Checker PRO</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

h1 {
  text-align: center;
  color: #38bdf8;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: #1f2937;
  padding: 15px;
  border-radius: 12px;
}

textarea {
  width: 100%;
  height: 120px;
  margin-top: 10px;
  background: #020617;
  color: white;
  border: none;
  padding: 10px;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  background: #38bdf8;
  border: none;
  cursor: pointer;
}

.result {
  margin-top: 10px;
  background: #020617;
  padding: 10px;
  border-radius: 10px;
  font-size: 14px;
  line-height: 1.6;
}

.clickable {
  cursor: pointer;
  color: #38bdf8;
}

.details {
  margin-top: 10px;
  font-size: 13px;
  color: #94a3b8;
  max-height: 120px;
  overflow-y: auto;
}
</style>

</head>

<body>

<div class="container">
<h1>Blacklist Checker PRO</h1>

<div class="grid">

<!-- GROUP C -->

<div class="card">
<h2>Group C</h2>
<textarea id="ips_C" placeholder="IPs"></textarea>
<textarea id="domains_C" placeholder="Domains"></textarea>
<button onclick="checkGroup('C')">Check C</button>
<div class="result" id="result_C"></div>
<div class="details" id="result_C_details"></div>
</div>

<!-- GROUP B -->

<div class="card">
<h2>Group B</h2>
<textarea id="ips_B" placeholder="IPs"></textarea>
<textarea id="domains_B" placeholder="Domains"></textarea>
<button onclick="checkGroup('B')">Check B</button>
<div class="result" id="result_B"></div>
<div class="details" id="result_B_details"></div>
</div>

<!-- GROUP ALL -->

<div class="card">
<h2>Group ALL</h2>
<button onclick="checkAll()">Check ALL</button>
<div class="result" id="result_ALL"></div>
<div class="details" id="result_ALL_details"></div>
</div>

</div>
</div>

<script>

function parseLines(text) {
  return text
    .split(/\\n|,|;|\\s+/)
    .map(x => x.trim())
    .filter(x => x.length > 0);
}

function process(ips, domains) {

  let css=[], xbl=[], pbl=[], sbl=[], barracuda=[], clean=[], dbl=[];

  ips.forEach(ip => {
    let score = Math.floor(Math.random()*100);

    if (score > 85) sbl.push(ip);
    else if (score > 70) xbl.push(ip);
    else if (score > 55) css.push(ip);
    else if (score > 40) pbl.push(ip);
    else if (score > 25) barracuda.push(ip);
    else clean.push(ip);
  });

  domains.forEach(d => {
    if (Math.random() > 0.5) dbl.push(d);
  });

  return {css,xbl,pbl,sbl,barracuda,clean,dbl};
}

function render(res, target) {

  document.getElementById(target).innerHTML = `
🟤 <span class="clickable" onclick="showList('${target}','css')">CSS : ${res.css.length}</span><br>
🟠 <span class="clickable" onclick="showList('${target}','xbl')">XBL : ${res.xbl.length}</span><br>
🔵 <span class="clickable" onclick="showList('${target}','pbl')">PBL : ${res.pbl.length}</span><br>
🔴 <span class="clickable" onclick="showList('${target}','sbl')">SBL : ${res.sbl.length}</span><br>
🟢 <span class="clickable" onclick="showList('${target}','barracuda')">Barracuda : ${res.barracuda.length}</span><br><br>

✅ Clean : ${res.clean.length}<br>
🌐 DBL : ${res.dbl.length}
  `;

  window[target + "_data"] = res;
}

function showList(target, type) {

  const data = window[target + "_data"];
  const list = data[type];

  let html = "<b>Details:</b><br>";

  if (list.length === 0) {
    html += "No results";
  } else {
    list.forEach(item => {
      html += item + "<br>";
    });
  }

  document.getElementById(target + "_details").innerHTML = html;
}

function checkGroup(group) {
  const ips = parseLines(document.getElementById("ips_" + group).value);
  const domains = parseLines(document.getElementById("domains_" + group).value);

  const res = process(ips, domains);
  render(res, "result_" + group);
}

function checkAll() {
  const ips = [
    ...parseLines(document.getElementById("ips_C").value),
    ...parseLines(document.getElementById("ips_B").value)
  ];

  const domains = [
    ...parseLines(document.getElementById("domains_C").value),
    ...parseLines(document.getElementById("domains_B").value)
  ];

  const res = process(ips, domains);
  render(res, "result_ALL");
}

</script>

</body>
</html>

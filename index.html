<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blacklist Checker</title>

<style>
body {
  background: #0b1220;
  font-family: Arial;
  color: white;
  text-align: center;
}

.container {
  width: 80%;
  margin: auto;
}

h1 {
  color: #38bdf8;
}

.box {
  display: inline-block;
  width: 40%;
  margin: 10px;
  padding: 15px;
  background: #1e293b;
  border-radius: 10px;
}

textarea {
  width: 90%;
  height: 150px;
  background: #020617;
  color: white;
  border: none;
  padding: 10px;
}

button {
  margin-top: 20px;
  padding: 10px 30px;
  background: #38bdf8;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.results {
  margin-top: 30px;
  padding: 20px;
  background: #020617;
  border-radius: 10px;
  text-align: left;
}
</style>

</head>

<body>

<div class="container">
<h1>Blacklist Checker</h1>

<div class="box">
<h3>IP Addresses</h3>
<textarea id="ips"></textarea>
</div>

<div class="box">
<h3>Domains</h3>
<textarea id="domains"></textarea>
</div>

<br>
<button onclick="check()">Check</button>

<div class="results" id="results">Ready...</div>
</div>

<script>

// fake scoring (simulation)
function fakeCheck(ip) {
  let score = Math.floor(Math.random() * 100);
  return score;
}

async function check() {
  const ips = document.getElementById("ips").value.split("\n");

  let css = 0;
  let xbl = 0;
  let pbl = 0;
  let sbl = 0;
  let barracuda = 0;
  let clean = 0;

  for (let ip of ips) {
    ip = ip.trim();
    if (!ip) continue;

    let score = fakeCheck(ip);

    if (score > 85) {
      sbl++;
    } else if (score > 70) {
      xbl++;
    } else if (score > 55) {
      css++;
    } else if (score > 40) {
      pbl++;
    } else if (score > 25) {
      barracuda++;
    } else {
      clean++;
    }
  }

  document.getElementById("results").innerHTML = `
<pre style="text-align:left; font-size:14px; line-height:1.6;">
🟤 CSS       : ${css}
🟠 XBL       : ${xbl}
🔵 PBL       : ${pbl}
🔴 SBL       : ${sbl}
🟢 Barracuda : ${barracuda}

✅ Clean     : ${clean}

━━━━━━━━━━━━━━
🌐 DOMAINS
━━━━━━━━━━━━━━
🌍 DBL       : ${Math.floor(Math.random()*ips.length)}
</pre>

`;
}

</script>

</body>
</html>

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blacklist Checker PRO</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: auto;
}

h1 {
  text-align: center;
  color: #38bdf8;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
}

.card {
  background: #1f2937;
  padding: 15px;
  border-radius: 12px;
}

textarea {
  width: 100%;
  height: 100px;
  margin-top: 10px;
  background: #020617;
  color: white;
  border: none;
  padding: 10px;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  background: #38bdf8;
  border: none;
  cursor: pointer;
}

.result {
  margin-top: 10px;
  background: #020617;
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #334155;
  padding: 6px;
  text-align: center;
}

select {
  margin-top: 10px;
  width: 100%;
  padding: 5px;
}
</style>

</head>

<body>

<div class="container">
<h1>Blacklist Checker PRO</h1>

<div class="grid">

<!-- GROUP C -->

<div class="card">
<h2>Group C</h2>
<textarea id="ips_C" placeholder="IPs"></textarea>
<textarea id="domains_C" placeholder="Domains"></textarea>
<button onclick="run('C')">Check C</button>
<div class="result" id="result_C"></div>
</div>

<!-- GROUP B -->

<div class="card">
<h2>Group B</h2>
<textarea id="ips_B" placeholder="IPs"></textarea>
<textarea id="domains_B" placeholder="Domains"></textarea>
<button onclick="run('B')">Check B</button>
<div class="result" id="result_B"></div>
</div>

<!-- GROUP ALL -->

<div class="card">
<h2>Group ALL</h2>
<button onclick="runAll()">Check ALL</button>
<div class="result" id="result_ALL"></div>
</div>

</div>
</div>

<script>

function parse(text) {
  return text.split(/\\n|,|;|\\s+/).map(x=>x.trim()).filter(x=>x);
}

function generate(ips) {
  let arr = [];

  ips.forEach(ip => {
    let score = Math.random()*100;
    let type = "Clean";

    if(score>85) type="SBL";
    else if(score>70) type="XBL";
    else if(score>55) type="CSS";
    else if(score>40) type="PBL";
    else if(score>25) type="Barracuda";

    arr.push({ip,type});
  });

  return arr;
}

function render(data, target) {

  window[target+"_data"]=data;

  let html = `
  <button onclick="copyData('${target}')">📋 Copy</button>
  <button onclick="exportData('${target}')">📁 Export</button>

  <select onchange="filter('${target}', this.value)">
    <option value="all">All</option>
    <option>Clean</option>
    <option>SBL</option>
    <option>XBL</option>
    <option>CSS</option>
    <option>PBL</option>
    <option>Barracuda</option>
  </select>

  <table>
  <tr><th>IP</th><th>Status</th></tr>
  `;

  data.forEach(d=>{
    html+=`<tr><td>${d.ip}</td><td>${d.type}</td></tr>`;
  });

  html+="</table>";

  document.getElementById(target).innerHTML=html;
}

function filter(target, type) {
  let data = window[target+"_data"];

  if(type!="all"){
    data = data.filter(d=>d.type==type);
  }

  render(data, target);
}

function copyData(target){
  let data = window[target+"_data"];
  let txt = data.map(d=>d.ip+" - "+d.type).join("\\n");
  navigator.clipboard.writeText(txt);
  alert("Copied");
}

function exportData(target){
  let data = window[target+"_data"];
  let txt = data.map(d=>d.ip+" - "+d.type).join("\\n");

  let blob = new Blob([txt], {type:"text/plain"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "results.txt";
  a.click();
}

function run(group){
  let ips = parse(document.getElementById("ips_"+group).value);
  let data = generate(ips);
  render(data, "result_"+group);
}

function runAll(){
  let ips = [
    ...parse(document.getElementById("ips_C").value),
    ...parse(document.getElementById("ips_B").value)
  ];

  let data = generate(ips);
  render(data, "result_ALL");
}

</script>

</body>
</html>

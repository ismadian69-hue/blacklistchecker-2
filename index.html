<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Checker PRO Step 2</title>

<style>
body{background:#0f172a;color:white;font-family:Arial;text-align:center}
textarea{width:80%;height:120px;margin:10px;background:#020617;color:white}
button{padding:10px;margin:5px;background:#38bdf8;border:none}
table{margin:auto;margin-top:20px;border-collapse:collapse;width:80%}
td,th{border:1px solid #334155;padding:8px}
</style>

</head>

<body>

<h1>Checker PRO</h1>

<textarea id="ips">8.8.8.8
1.1.1.1</textarea><br>

<button onclick="run()">Check</button> <button onclick="copy()">Copy</button> <button onclick="download()">Export</button>

<div id="result"></div>

<script>

let DATA = [];

function run(){
  let ips = document.getElementById("ips").value.split("\n");

  DATA = [];

  let html = "<table><tr><th>IP</th><th>Status</th></tr>";

  ips.forEach(ip=>{
    ip = ip.trim();
    if(!ip) return;

    let r = Math.random();
    let type = "Clean";

    if(r>0.8) type="SBL";
    else if(r>0.6) type="XBL";
    else if(r>0.4) type="CSS";

    DATA.push(ip+" - "+type);

    html += "<tr><td>"+ip+"</td><td>"+type+"</td></tr>";
  });

  html += "</table>";

  document.getElementById("result").innerHTML = html;
}

function copy(){
  if(DATA.length==0){ alert("no data"); return; }
  navigator.clipboard.writeText(DATA.join("\n"));
  alert("copied");
}

function download(){
  if(DATA.length==0){ alert("no data"); return; }

  let blob = new Blob([DATA.join("\n")],{type:"text/plain"});
  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "result.txt";
  a.click();
}

</script>

</body>
</html>
